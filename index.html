<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JCC CMS 後台</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => {
          return entry.get('data').set('publishTimestamp', new Date().toISOString());
        },
      });
    </script>
  </body>
</html>
