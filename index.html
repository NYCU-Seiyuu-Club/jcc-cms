<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JCC CMS 後台</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
          CMS.registerEventListener({
            name: 'preSave',
            handler: ({ entry }) => {
              const currentData = entry.get('data');

              const now = new Date();
              const utc8Time = new Date(now.getTime() + (8 * 60 * 60 * 1000));
              const timestamp = utc8Time.toISOString().replace('Z', '+08:00');

              const newData = currentData.set('publishTimestamp', timestamp);
              return newData;
            },
          });
        </script>
  </body>
</html>
