backend:
  name: github
  # 1. 這裡請換成你「主網站 (Repo A)」的 GitHub 路徑 (例如: username/my-website)
  repo: NYCU-Seiyuu-Club/jcc-cms
  # 2. 確認你主網站的主分支名稱，如果是 master 請改為 master
  branch: main
  base_url: https://jcc-cms.netlify.app

media_folder: "public/images/announcements"
public_folder: "/images/announcements"

collections:
  - name: "announcements"
    label: "公告 (Announcements)"
    folder: "content/announcements" # Markdown 檔案會寫入到主網站的這個資料夾
    create: true
    slug: "{{slug}}"
    fields:
      - label: "網址路徑 (Slug)"
        name: "slug"
        widget: "string"
        hint: "請輸入英文小寫與橫線，例如: my-first-post"

      - label: "標題 (Title)"
        name: "title"
        widget: "string"

      - label: "系統發布時間 (Publish Timestamp)"
        name: "publishTimestamp"
        widget: "datetime"

      - label: "活動日期 (Date)"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        time_format: false  # 修正處：關閉時間選擇，只顯示日期

      - label: "分類 (Category)"
        name: "category"
        widget: "select"
        options: ["社課", "活動", "交流", "徵件"]

      - label: "群組 (Group)"
        name: "group"
        widget: "select"
        options: ["UTAGE", "POPULAR", "TRADITION", "GEO"]

      - label: "封面圖片 (Cover Image)"
        name: "coverImage"
        widget: "image"
        required: false

      - label: "摘要 (Summary)"
        name: "summary"
        widget: "text"
        required: false

      - label: "內文 (Body)"
        name: "body"
        widget: "markdown"
